<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя перша веб-сторінка</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            color: white;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

            header h1 {
                font-size: 48px;
                margin-bottom: 10px;
            }

            header p {
                font-size: 20px;
                opacity: 0.9;
            }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

            .card h2 {
                margin-top: 0;
                font-size: 32px;
            }

        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #ffffff;
            color: #4e54c8;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

            a.button:hover {
                background: #ddd;
            }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Лабораторна робота №1</h1>
        <p>Основи веброзробки — моя перша HTML сторінка</p>
    </header>

    <div class="card">
        <h2>Про сторінку</h2>
        <p>
            Це демонстраційна веб-сторінка, створена для виконання ЛР1.
            Вона оформлена з використанням сучасного дизайну, градієнтів та ефекту "скляної" панелі.
        </p>

        <a class="button" href="#">Мій GitHub</a>
    </div>

    <footer>
        © 2026. Створено для навчання.
    </footer>

</body>
</html>
